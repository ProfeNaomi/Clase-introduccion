<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase de Matemáticas - Naomi Urrea</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Presentación interactiva de matemáticas para educación secundaria. Diseño premium y educativo.">
</head>
<body class="light">
    <header>
        <div class="header-left">
            <div class="slide-nav" id="slide-nav-container">
                <!-- Numbers will be injected by JS -->
            </div>
        </div>
        
        <div class="header-actions">
            <button class="action-btn toggle-btn" id="edit-mode-btn">
                <span>📝</span> Modo Editor: <strong id="edit-mode-status">OFF</strong>
            </button>
            <button class="action-btn" id="add-slide-btn" style="display: none;">
                <span>➕</span> Diapositiva
            </button>
            <button class="action-btn" id="theme-btn">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">Oscuro</span>
            </button>
        </div>
    </header>

    <main id="main-presentation">
        <div class="slides-container" id="slides-container">
            <!-- Slides dynamically populated -->
        </div>
    </main>

    <footer>
        <button class="btn-ctrl" id="prev-btn" disabled>
            <span>←</span> Anterior
        </button>
        <div class="current-label" style="font-size: 1.5rem; font-weight: 600; color: var(--text-secondary)">
            Diapositiva <span id="current-page-num">1</span> de <span id="total-page-num">1</span>
        </div>
        <button class="btn-ctrl" id="next-btn">
            Siguiente <span>→</span>
        </button>
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
